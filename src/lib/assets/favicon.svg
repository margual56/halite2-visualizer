<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="planet" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#5b9bd9"/>
      <stop offset="55%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0a1829"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
  </defs>

  <!-- Space background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="5"  cy="5"  r="0.9" fill="white" opacity="0.7"/>
  <circle cx="27" cy="7"  r="0.7" fill="white" opacity="0.5"/>
  <circle cx="26" cy="26" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="4"  cy="25" r="0.6" fill="white" opacity="0.4"/>

  <!-- Planet -->
  <circle cx="16" cy="16" r="9" fill="url(#planet)"/>

  <!-- Orbital ring (tilted ellipse, clipped so it passes behind the planet) -->
  <ellipse cx="16" cy="16" rx="13.5" ry="4" fill="none"
           stroke="#2dd4bf" stroke-width="1.4" opacity="0.85"
           transform="rotate(-28 16 16)"/>
  <!-- Front half of ring goes on top; back half is hidden by the planet -->
  <ellipse cx="16" cy="16" rx="13.5" ry="4" fill="none"
           stroke="#2dd4bf" stroke-width="1.4" opacity="0.85"
           stroke-dasharray="24 20"
           stroke-dashoffset="10"
           transform="rotate(-28 16 16)"/>
  <!-- Planet drawn again on top to occlude the back half of the ring -->
  <circle cx="16" cy="16" r="9" fill="url(#planet)"/>

  <!-- Sphere shading -->
  <circle cx="16" cy="16" r="9" fill="url(#shade)" opacity="0.6"/>
  <defs>
    <radialGradient id="shade" cx="65%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
